

spring:
  ### config datasource - postgreSQL
  datasource:
    url: jdbc:postgresql://localhost:3333/his?currentSchema=webtool
    username: postgres
    password: 123zxc123
    sqlScriptEncoding: UTF-8
    driverClassName: org.postgresql.Driver
    hikari:
      maximum-pool-size: 15
      minimum-idle: 3
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  ### liquibase
  liquibase:
    change-log: /db/changelog/changelog.xml
    drop-first: false

  ### config hibernate
  jpa:
    database: postgresql
    hibernate:
      ddl-auto: none
    show-sql: true
    generate-ddl: true

  ### message
  messages:
    basename: i18n/message,i18n/app-message,i18n/validation-message
    encoding: utf-8

### enable logging
logging:
  level:
    org:
      hibernate:
        type: trace
        state: debug

